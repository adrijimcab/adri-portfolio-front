name: Accessibility

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: Playwright + axe-core
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (production)
        run: npm run build

      - name: Start SSR server
        run: |
          node dist/adri-portfolio-front/server/server.mjs &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 5
        env:
          PORT: 4000

      - name: Run axe-core checks
        run: npx playwright test e2e/a11y.spec.ts --project=chromium

      - name: Stop SSR server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then kill $SERVER_PID || true; fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
