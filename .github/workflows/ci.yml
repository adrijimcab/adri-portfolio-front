name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Angular SSR production)
        run: npm run build

      - name: Verify SSR output structure
        run: |
          test -d dist/adri-portfolio-front/browser
          test -d dist/adri-portfolio-front/server
          test -f dist/adri-portfolio-front/server/server.mjs
          echo "SSR output structure OK"
