name: Lighthouse CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production SSR)
        run: npm run build

      - name: Start SSR server
        run: |
          PORT=4000 node dist/adri-portfolio-front/server/server.mjs &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait until the server is reachable
          for i in {1..30}; do
            if curl -sf http://localhost:4000/ > /dev/null; then
              echo "Server up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:4000/
            http://localhost:4000/uses
            http://localhost:4000/stack
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop SSR server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then kill $SERVER_PID || true; fi
